<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Typical Coffee - ኢንቨስትመንት</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #eef5e8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding-bottom: 70px; }
        .app-container { max-width: 500px; margin: 0 auto; background: #ffffff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); position: relative; }
        .auth-card { padding: 30px 20px; }
        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h1 { color: #6f4e2e; font-size: 2rem; } /* coffee color */
        .toggle-buttons { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 2px solid #ddd; }
        .toggle-btn { flex: 1; text-align: center; padding: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; color: #888; }
        .toggle-btn.active { color: #6f4e2e; border-bottom: 3px solid #6f4e2e; }
        .form-group { margin-bottom: 20px; }
        input, select { width: 100%; padding: 14px; border: 1px solid #ccc; border-radius: 60px; font-size: 1rem; outline: none; }
        button { width: 100%; padding: 14px; background: #6f4e2e; color: white; border: none; border-radius: 60px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .error { color: #d32f2f; font-size: 0.8rem; text-align: center; margin-top: 8px; }
        .dashboard { display: none; }
        .top-bar { background: #6f4e2e; padding: 20px 16px 12px; color: white; }
        .greeting { font-size: 1.2rem; font-weight: bold; }
        .logout-link { text-align: right; font-size: 0.7rem; margin: 10px 16px; cursor: pointer; color: #b85c00; }
        .balance-card { background: #f9f9f9; border-radius: 28px; padding: 20px; margin: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .balance-amount { font-size: 2rem; font-weight: bold; color: #6f4e2e; }
        .quick-actions { display: flex; justify-content: space-around; margin: 16px; gap: 10px; }
        .quick-btn { background: white; border: 1px solid #ddd; border-radius: 60px; padding: 10px 0; text-align: center; flex: 1; cursor: pointer; transition: 0.2s; }
        .quick-btn i { font-size: 1.5rem; color: #6f4e2e; display: block; margin-bottom: 5px; }
        .quick-btn span { font-size: 0.75rem; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 500px; margin: 0 auto; background: white; display: flex; justify-content: space-around; padding: 10px 0 20px; border-top: 1px solid #eee; }
        .nav-item { text-align: center; cursor: pointer; flex: 1; color: #888; }
        .nav-item i { font-size: 1.5rem; display: block; margin-bottom: 4px; }
        .nav-item span { font-size: 0.7rem; }
        .nav-item.active { color: #6f4e2e; }
        .panel { display: none; padding: 16px; }
        .panel.active-panel { display: block; }
        .vip-card, .order-item, .bank-card-form, .withdraw-card, .deposit-amount-selector { background: #f9f9f9; border-radius: 28px; padding: 16px; margin-bottom: 16px; }
        .vip-title { font-size: 1.2rem; font-weight: bold; }
        .vip-detail { display: flex; justify-content: space-between; margin: 8px 0; }
        .btn-purchase { background: #6f4e2e; padding: 8px; border-radius: 60px; margin-top: 8px; }
        .amount-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .amount-btn { background: #e0e0e0; padding: 10px; text-align: center; border-radius: 60px; cursor: pointer; }
        .amount-btn.selected { background: #6f4e2e; color: white; }
        .bank-select { display: flex; gap: 15px; flex-wrap: wrap; margin: 15px 0; }
        .bank-option { flex: 1; text-align: center; padding: 8px; border: 1px solid #ddd; border-radius: 60px; cursor: pointer; }
        .bank-option.selected { background: #6f4e2e; color: white; }
        .copy-btn { background: #6f4e2e; padding: 4px 12px; border-radius: 40px; color: white; cursor: pointer; display: inline-block; margin-left: 10px; font-size: 0.7rem; }
        .team-level { background: #f0f0f0; border-radius: 20px; padding: 12px; margin: 10px 0; }
        .hide { display: none; }
        .transaction-item { background: white; border-radius: 20px; padding: 8px 12px; margin: 5px 0; }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Auth Section -->
    <div id="authSection">
        <div class="auth-card">
            <div class="auth-header"><h1>☕ TYPICAL COFFEE</h1><p>Start your wealth journey here</p></div>
            <div class="toggle-buttons">
                <div id="loginTab" class="toggle-btn active">LOG IN</div>
                <div id="registerTab" class="toggle-btn">REGISTER</div>
            </div>
            <div id="loginForm">
                <div class="form-group"><input type="tel" id="loginPhone" placeholder="Mobile Number"></div>
                <div class="form-group"><input type="password" id="loginPassword" placeholder="Password"></div>
                <button id="doLoginBtn">LOG IN</button>
                <div id="loginError" class="error"></div>
            </div>
            <div id="registerForm" style="display:none;">
                <div class="form-group"><input type="tel" id="regPhone" placeholder="Mobile Number"></div>
                <div class="form-group"><input type="password" id="regPassword" placeholder="Password"></div>
                <div class="form-group"><input type="password" id="regConfirm" placeholder="Confirm Password"></div>
                <div class="form-group"><input type="text" id="inviteCode" placeholder="Invitation Code (optional)"></div>
                <button id="doRegisterBtn">REGISTER</button>
                <div id="regError" class="error"></div>
            </div>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="top-bar"><div class="greeting" id="greetingText">☕ Welcome, User!</div></div>
        <div class="logout-link" id="logoutBtn">← Logout</div>

        <div class="balance-card">
            <div>My Balance</div>
            <div class="balance-amount" id="balanceDisplay">ETB 0.00</div>
            <div>Total Income: <span id="totalIncome">ETB 0.00</span></div>
        </div>

        <div class="quick-actions">
            <div class="quick-btn" data-action="deposit"><i class="fas fa-download"></i><span>Deposit</span></div>
            <div class="quick-btn" data-action="withdraw"><i class="fas fa-upload"></i><span>Withdraw</span></div>
            <div class="quick-btn" data-action="checkin"><i class="fas fa-calendar-check"></i><span>Check In</span></div>
            <div class="quick-btn" data-action="service"><i class="fas fa-headset"></i><span>Service</span></div>
        </div>

        <!-- Panels -->
        <div id="homePanel" class="panel active-panel"></div>
        <div id="ordersPanel" class="panel"></div>
        <div id="showPanel" class="panel"></div>   <!-- Share panel -->
        <div id="sharePanel" class="panel"></div>
        <div id="myPanel" class="panel"></div>
        <div id="depositPanel" class="panel"></div>
        <div id="withdrawPanel" class="panel"></div>
        <div id="servicePanel" class="panel"></div>
        <div id="bankAccountPanel" class="panel"></div>
        <div id="changePasswordPanel" class="panel"></div>
        <div id="treasurePanel" class="panel"></div>

        <div class="bottom-nav">
            <div class="nav-item" data-nav="home"><i class="fas fa-home"></i><span>Home</span></div>
            <div class="nav-item" data-nav="orders"><i class="fas fa-shopping-bag"></i><span>Orders</span></div>
            <div class="nav-item" data-nav="show"><i class="fas fa-share-alt"></i><span>Show</span></div>
            <div class="nav-item" data-nav="share"><i class="fas fa-users"></i><span>Share</span></div>
            <div class="nav-item" data-nav="my"><i class="fas fa-user"></i><span>My</span></div>
        </div>
    </div>
</div>

<script>
    // ---------- Data Models ----------
    let currentUser = null;
    function getUsers() { return JSON.parse(localStorage.getItem("tc_users") || "{}"); }
    function saveUsers(users) { localStorage.setItem("tc_users", JSON.stringify(users)); }
    function getUserStats(phone) { let s = localStorage.getItem("tc_stats_"+phone); return s ? JSON.parse(s) : { balance:0, totalIncome:0, totalDeposit:0, totalWithdraw:0, lastCheckIn:null }; }
    function saveUserStats(phone, stats) { localStorage.setItem("tc_stats_"+phone, JSON.stringify(stats)); }
    function getUserBank(phone) { let b = localStorage.getItem("tc_bank_"+phone); return b ? JSON.parse(b) : null; }
    function saveUserBank(phone, bank) { localStorage.setItem("tc_bank_"+phone, JSON.stringify(bank)); }
    function getUserPurchases(phone) { let p = localStorage.getItem("tc_purchases_"+phone); return p ? JSON.parse(p) : []; }
    function saveUserPurchases(phone, purchases) { localStorage.setItem("tc_purchases_"+phone, JSON.stringify(purchases)); }
    function getUserWithdrawals(phone) { let w = localStorage.getItem("tc_withdrawals_"+phone); return w ? JSON.parse(w) : []; }
    function saveUserWithdrawals(phone, wd) { localStorage.setItem("tc_withdrawals_"+phone, JSON.stringify(wd)); }
    function getUserTransactions(phone) { let t = localStorage.getItem("tc_transactions_"+phone); return t ? JSON.parse(t) : []; }
    function saveUserTransactions(phone, tx) { localStorage.setItem("tc_transactions_"+phone, JSON.stringify(tx)); }
    function getReferralTree() { return JSON.parse(localStorage.getItem("tc_referrals") || "{}"); }
    function saveReferralTree(tree) { localStorage.setItem("tc_referrals", JSON.stringify(tree)); }

    // VIP data
    const vipLevels = [
        { id:1, name:"VIP1", price:1200, daily:100, total:30000, days:300 },
        { id:2, name:"VIP2", price:3200, daily:270, total:81000, days:300 },
        { id:3, name:"VIP3", price:6400, daily:560, total:168000, days:300 },
        { id:4, name:"VIP4", price:10000, daily:909, total:272700, days:300 },
        { id:5, name:"VIP5", price:23000, daily:2150, total:645000, days:300 },
        { id:6, name:"VIP6", price:43000, daily:4150, total:1245000, days:300 },
        { id:7, name:"VIP7", price:86000, daily:8600, total:2580003, days:300 },
        { id:8, name:"VIP8", price:120000, daily:12500, total:3750000, days:300 },
        { id:9, name:"VIP9", price:240000, daily:26000, total:7800000, days:300 },
        { id:10, name:"VIP10", price:340000, daily:38000, total:11400003, days:300 }
    ];

    // Helper functions
    function updateDashboardUI() {
        if(!currentUser) return;
        let stats = getUserStats(currentUser);
        document.getElementById('balanceDisplay').innerText = `ETB ${stats.balance.toFixed(2)}`;
        document.getElementById('totalIncome').innerText = `ETB ${stats.totalIncome.toFixed(2)}`;
        document.getElementById('greetingText').innerHTML = `☕ Welcome, ${currentUser.slice(-4)}!`;
    }

    // Daily income from purchases
    function processDailyIncome(phone) {
        let purchases = getUserPurchases(phone);
        let stats = getUserStats(phone);
        let now = Date.now();
        let updated = false;
        for(let p of purchases) {
            if(!p.lastClaim) p.lastClaim = p.purchaseTime;
            let daysSince = Math.floor((now - p.lastClaim) / (24*60*60*1000));
            if(daysSince >= 1) {
                let vip = vipLevels.find(v => v.id === p.vipId);
                if(vip) {
                    let income = vip.daily * daysSince;
                    stats.balance += income;
                    stats.totalIncome += income;
                    p.lastClaim += daysSince * 24*60*60*1000;
                    updated = true;
                }
            }
        }
        if(updated) {
            saveUserStats(phone, stats);
            saveUserPurchases(phone, purchases);
            updateDashboardUI();
        }
    }

    // Render Home (Purchase Area)
    function renderHome() {
        let stats = getUserStats(currentUser);
        let html = `<div class="balance-card"><div>Typical Coffee Purchase Area</div></div>`;
        for(let vip of vipLevels) {
            html += `<div class="vip-card">
                <div class="vip-title">☕ ${vip.name}</div>
                <div>Price: ${vip.price} ETB</div>
                <div class="vip-detail"><span>Daily Income:</span><span>ETB ${vip.daily}</span></div>
                <div class="vip-detail"><span>Total Income:</span><span>ETB ${vip.total}</span></div>
                <div class="vip-detail"><span>Mining Days:</span><span>${vip.days} days</span></div>
                <button class="btn-purchase" data-vip="${vip.id}">Purchase Amount: ETB ${vip.price}</button>
            </div>`;
        }
        document.getElementById('homePanel').innerHTML = html;
        document.querySelectorAll('.btn-purchase').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let vipId = parseInt(btn.getAttribute('data-vip'));
                let vip = vipLevels.find(v => v.id === vipId);
                let stats = getUserStats(currentUser);
                if(stats.balance >= vip.price) {
                    stats.balance -= vip.price;
                    saveUserStats(currentUser, stats);
                    let purchases = getUserPurchases(currentUser);
                    purchases.push({ vipId, purchaseTime: Date.now(), lastClaim: Date.now() });
                    saveUserPurchases(currentUser, purchases);
                    alert(`Successfully purchased ${vip.name}! Daily income of ${vip.daily} ETB will be added each day.`);
                    updateDashboardUI();
                    renderHome();
                } else {
                    alert(`Your balance is insufficient. Need ${vip.price} ETB. Please recharge.`);
                }
            });
        });
    }

    // Deposit flow
    let selectedDepositAmount = null;
    let selectedBank = null;
    let currentOrderCode = null;
    function renderDeposit() {
        const panel = document.getElementById('depositPanel');
        panel.innerHTML = `
            <div class="vip-card"><h3>Deposit</h3>
            <div class="amount-grid" id="amountGrid"></div>
            <div id="continueBtnArea"></div>
            <div id="bankSelectionArea" class="hide"></div>
            <div id="payArea" class="hide"></div>
            <div id="transferDetailArea" class="hide"></div>
            </div>
        `;
        const amounts = [900,1200,3200,6400,10000,23000,43000,86000,120000,240000,340000];
        let amountHtml = '';
        amounts.forEach(amt => {
            amountHtml += `<div class="amount-btn" data-amount="${amt}">${amt} ETB</div>`;
        });
        document.getElementById('amountGrid').innerHTML = amountHtml;
        document.querySelectorAll('.amount-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.amount-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedDepositAmount = parseInt(btn.getAttribute('data-amount'));
                document.getElementById('continueBtnArea').innerHTML = `<button id="continueDepositBtn">Continue</button>`;
                document.getElementById('continueDepositBtn').onclick = () => showBankSelection();
            });
        });
    }
    function showBankSelection() {
        document.getElementById('bankSelectionArea').classList.remove('hide');
        const banks = ["CBE", "Awash", "Abysinia", "Oromia", "Dashen", "Lion", "Zemen"];
        let bankHtml = '<div class="bank-select">';
        banks.forEach(b => { bankHtml += `<div class="bank-option" data-bank="${b}">${b}</div>`; });
        bankHtml += '</div><button id="confirmBankBtn">PAY Br ' + selectedDepositAmount + '</button>';
        document.getElementById('bankSelectionArea').innerHTML = bankHtml;
        document.querySelectorAll('.bank-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.bank-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
                selectedBank = opt.getAttribute('data-bank');
            });
        });
        document.getElementById('confirmBankBtn').onclick = () => {
            if(!selectedBank) { alert("Please select a bank"); return; }
            showPaymentDetails();
        };
    }
    function showPaymentDetails() {
        let orderCode = "PN" + Date.now() + Math.floor(Math.random()*10000);
        currentOrderCode = orderCode;
        let detailHtml = `<div class="bank-detail" style="background:#fff3e0;padding:15px;border-radius:28px;">
            <div><strong>Name:</strong> ABRHAM EWUNETE EJIGALEM</div>
            <div><strong>Bank:</strong> ${selectedBank}</div>
            <div><strong>Account:</strong> 1000529209928</div>
            <div><strong>Amount:</strong> ${selectedDepositAmount} ETB</div>
            <div><strong>Order Code:</strong> ${orderCode} <span class="copy-btn" data-copy="${orderCode}">Copy</span></div>
            <div><small>Please fill in the order code when transferring.</small></div>
            <button id="iHavePaidBtn">I have made bank transfer</button>
            </div>`;
        document.getElementById('transferDetailArea').innerHTML = detailHtml;
        document.getElementById('transferDetailArea').classList.remove('hide');
        document.querySelector('.copy-btn')?.addEventListener('click', (e) => {
            let text = e.currentTarget.getAttribute('data-copy');
            navigator.clipboard.writeText(text);
            alert("Copied: "+text);
        });
        document.getElementById('iHavePaidBtn').onclick = () => {
            let tid = prompt("Please enter the Transaction ID / Session ID from your bank:");
            if(tid && tid.length > 0) {
                // Simulate verification
                alert("Transaction submitted! Your balance will be updated shortly.");
                let stats = getUserStats(currentUser);
                stats.balance += selectedDepositAmount;
                stats.totalDeposit += selectedDepositAmount;
                stats.totalIncome += selectedDepositAmount;
                saveUserStats(currentUser, stats);
                // Record transaction
                let txns = getUserTransactions(currentUser);
                txns.push({ type:"deposit", amount:selectedDepositAmount, timestamp:Date.now(), tid });
                saveUserTransactions(currentUser, txns);
                // Update referral commissions for upline
                let users = getUsers();
                let referrer = users[currentUser]?.referrer;
                if(referrer) {
                    let refStats = getUserStats(referrer);
                    let commission = selectedDepositAmount * 0.2;
                    refStats.balance += commission;
                    refStats.totalIncome += commission;
                    saveUserStats(referrer, refStats);
                    // Level2 and level3 can be implemented similarly (omitted for brevity but can be added)
                }
                updateDashboardUI();
                showPanel('home');
            } else {
                alert("Transaction ID is required. Please try again.");
            }
        };
    }

    // Withdraw
    function renderWithdraw() {
        let stats = getUserStats(currentUser);
        let bank = getUserBank(currentUser);
        let bankHtml = bank ? `<div>Bank: ${bank.bankName}<br>Account: ${bank.accountNumber}<br>Holder: ${bank.holderName}</div>` : '<div class="error">No bank account added. Please add in My > Bank Account.</div>';
        const panel = document.getElementById('withdrawPanel');
        panel.innerHTML = `<div class="withdraw-card">
            <h3>Withdrawal</h3>
            <div><strong>Balance:</strong> ETB ${stats.balance.toFixed(2)}</div>
            <div><strong>Amount to withdraw:</strong> <input type="number" id="withdrawAmount" placeholder="ETB"></div>
            <div><strong>Bank Information:</strong></div>
            ${bankHtml}
            <button id="confirmWithdrawBtn">Confirm</button>
            <div class="withdraw-rules" style="margin-top:15px; font-size:0.8rem;">Withdrawal Instructions:<br>1. Minimum 300 ETB<br>2. Working hours: 10:00 - 17:00<br>3. 10% fee</div>
        </div>`;
        document.getElementById('confirmWithdrawBtn').onclick = () => {
            let amount = parseFloat(document.getElementById('withdrawAmount').value);
            let now = new Date();
            let hour = now.getHours();
            if(amount < 300) { alert("Minimum withdrawal is 300 ETB"); return; }
            if(amount > stats.balance) { alert("Insufficient balance"); return; }
            if(hour < 10 || hour >= 17) { alert("Withdrawals allowed only between 10:00 and 17:00"); return; }
            if(!bank) { alert("Please add bank account first"); return; }
            let confirmMsg = confirm(`Withdraw ${amount} ETB? 10% fee will be applied.`);
            if(confirmMsg) {
                let fee = amount * 0.1;
                let net = amount - fee;
                stats.balance -= amount;
                stats.totalWithdraw += amount;
                saveUserStats(currentUser, stats);
                let wds = getUserWithdrawals(currentUser);
                wds.push({ amount, fee, net, timestamp:Date.now(), status:"success" });
                saveUserWithdrawals(currentUser, wds);
                alert(`Withdrawal successful! Amount: ${amount} ETB, Fee: ${fee} ETB, Net: ${net} ETB`);
                updateDashboardUI();
                showPanel('home');
            }
        };
    }

    // Check In
    function renderCheckIn() {
        let stats = getUserStats(currentUser);
        let today = new Date().toDateString();
        let already = (stats.lastCheckIn === today);
        const panel = document.getElementById('servicePanel'); // reuse service panel? We'll create a modal? But we can show in same panel.
        // We'll handle check-in from quick action directly.
        if(already) alert("You have already checked in today!");
        else {
            stats.balance += 10;
            stats.totalIncome += 10;
            stats.lastCheckIn = today;
            saveUserStats(currentUser, stats);
            updateDashboardUI();
            alert("Check-in successful! +10 ETB");
        }
    }

    // Service
    function renderService() {
        const panel = document.getElementById('servicePanel');
        panel.innerHTML = `<div style="background:#f9f9f9; border-radius:28px; padding:20px;">
            <div class="service-option" id="customerServiceBtn">☕ Typical Coffee Customer Service</div>
            <div class="service-option" id="officialChannelBtn">📢 Typical Coffee Official Channel</div>
        </div>`;
        document.getElementById('customerServiceBtn')?.addEventListener('click', () => window.location.href="https://t.me/greenplantcustemerservice");
        document.getElementById('officialChannelBtn')?.addEventListener('click', () => window.location.href="https://t.me/greenplantoffcial");
    }

    // Orders
    function renderOrders() {
        let purchases = getUserPurchases(currentUser);
        let html = '<h3>My Orders</h3>';
        if(purchases.length === 0) html += '<div>No purchases yet.</div>';
        else {
            for(let p of purchases) {
                let vip = vipLevels.find(v => v.id === p.vipId);
                if(vip) {
                    let lastClaimDate = p.lastClaim ? new Date(p.lastClaim).toLocaleDateString() : 'Never';
                    html += `<div class="order-item">${vip.name} - Price: ${vip.price} ETB<br>Daily Income: ${vip.daily} ETB<br>Last claimed: ${lastClaimDate}</div>`;
                }
            }
        }
        document.getElementById('ordersPanel').innerHTML = html;
    }

    // Share (Team & Referrals)
    function renderShare() {
        let users = getUsers();
        let myCode = users[currentUser]?.inviteCode || (()=>{ let code = Math.random().toString(36).substring(2,8).toUpperCase(); users[currentUser].inviteCode = code; saveUsers(users); return code; })();
        let baseUrl = window.location.href.split('?')[0];
        let inviteLink = `${baseUrl}?ref=${myCode}`;
        let referrals = getReferralTree();
        let myTeam = referrals[currentUser] || { members: [], activeMembers: [] };
        let level1Count = myTeam.members.length;
        let level1Active = myTeam.activeMembers.length;
        let level2Count = 0, level2Active = 0;
        // simplified level2
        for(let m of myTeam.members) {
            let sub = referrals[m] || { members: [] };
            level2Count += sub.members.length;
            level2Active += (sub.activeMembers?.length || 0);
        }
        const panel = document.getElementById('sharePanel');
        panel.innerHTML = `<div style="background:#f9f9f9; border-radius:28px; padding:20px;">
            <div><strong>Invitation code:</strong> ${myCode} <span class="copy-btn" data-copy="${myCode}">Copy</span></div>
            <div><strong>Invitation link:</strong> ${inviteLink} <span class="copy-btn" data-copy="${inviteLink}">Copy</span></div>
            <hr>
            <div class="team-level"><strong>Team 1 (20%)</strong><br>Members: ${level1Count}<br>Active: ${level1Active}<br>Commission: ETB 0</div>
            <div class="team-level"><strong>Team 2 (3%)</strong><br>Members: ${level2Count}<br>Active: ${level2Active}<br>Commission: ETB 0</div>
            <div class="team-level"><strong>Team 3 (2%)</strong><br>Members: 0<br>Active: 0<br>Commission: ETB 0</div>
            <div><small>Referral rewards: 20% for direct, 3% for level2, 2% for level3.</small></div>
        </div>`;
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.addEventListener('click', (e) => { let text = btn.getAttribute('data-copy'); navigator.clipboard.writeText(text); alert("Copied: "+text); });
        });
    }

    // My page
    function renderMy() {
        let stats = getUserStats(currentUser);
        let bank = getUserBank(currentUser);
        let bankInfo = bank ? `${bank.bankName} - ${bank.accountNumber}` : 'Not added';
        const panel = document.getElementById('myPanel');
        panel.innerHTML = `<div style="background:#f9f9f9; border-radius:28px; padding:20px;">
            <div><i class="fas fa-user-circle"></i> ${currentUser}</div>
            <div>Balance: ${stats.balance.toFixed(2)} ETB</div>
            <div>Total Deposit: ${stats.totalDeposit.toFixed(2)}</div>
            <div>Total Withdraw: ${stats.totalWithdraw.toFixed(2)}</div>
            <hr>
            <div class="quick-actions" style="flex-wrap:wrap;">
                <button id="teamTaskBtn">Team Task</button>
                <button id="chestBtn">Chest</button>
                <button id="reportsBtn">Reports</button>
                <button id="bankAccountBtn">Bank Account</button>
                <button id="customerServiceBtn2">Customer Service</button>
                <button id="changePasswordBtn">Change Password</button>
                <button id="downloadBtn">Download</button>
            </div>
            <div id="myDynamicContent"></div>
        </div>`;
        document.getElementById('bankAccountBtn').onclick = () => showBankAccountForm();
        document.getElementById('changePasswordBtn').onclick = () => showChangePassword();
        document.getElementById('chestBtn').onclick = () => showTreasure();
        document.getElementById('teamTaskBtn').onclick = () => alert("Team tasks: Invite more members to earn commissions.");
        document.getElementById('reportsBtn').onclick = () => { let txns = getUserTransactions(currentUser); alert("Transactions: "+JSON.stringify(txns)); };
        document.getElementById('customerServiceBtn2').onclick = () => showPanel('service');
        document.getElementById('downloadBtn').onclick = () => alert("App download link: https://example.com");
    }

    function showBankAccountForm() {
        let bank = getUserBank(currentUser);
        const container = document.getElementById('myDynamicContent');
        container.innerHTML = `<div class="bank-card-form">
            <input type="text" id="bankName" placeholder="Bank Name" value="${bank?.bankName || ''}">
            <input type="text" id="accountNumber" placeholder="Account Number" value="${bank?.accountNumber || ''}">
            <input type="text" id="holderName" placeholder="Holder Name" value="${bank?.holderName || ''}">
            <button id="saveBankBtn">Confirm</button>
        </div>`;
        document.getElementById('saveBankBtn').onclick = () => {
            let bankName = document.getElementById('bankName').value.trim();
            let acc = document.getElementById('accountNumber').value.trim();
            let name = document.getElementById('holderName').value.trim();
            if(!bankName || !acc || !name) { alert("All fields required"); return; }
            saveUserBank(currentUser, { bankName, accountNumber:acc, holderName:name });
            alert("Bank account saved!");
            renderMy();
        };
    }

    function showChangePassword() {
        let users = getUsers();
        const container = document.getElementById('myDynamicContent');
        container.innerHTML = `<div class="setting-card">
            <input type="password" id="oldPass" placeholder="Current Password">
            <input type="password" id="newPass" placeholder="New Password">
            <input type="password" id="confirmPass" placeholder="Confirm Password">
            <button id="changePwdConfirm">Confirm</button>
        </div>`;
        document.getElementById('changePwdConfirm').onclick = () => {
            let old = document.getElementById('oldPass').value;
            let newp = document.getElementById('newPass').value;
            let conf = document.getElementById('confirmPass').value;
            if(users[currentUser].password !== old) { alert("Wrong old password"); return; }
            if(newp !== conf) { alert("Passwords do not match"); return; }
            if(newp.length < 6) { alert("Password must be at least 6 characters"); return; }
            users[currentUser].password = newp;
            saveUsers(users);
            alert("Password changed successfully!");
            renderMy();
        };
    }

    function showTreasure() {
        const container = document.getElementById('myDynamicContent');
        container.innerHTML = `<div class="treasure-card">
            <h4>Treasure Reward</h4>
            <input type="text" id="rewardCode" placeholder="Enter reward code">
            <button id="getRewardBtn">Get reward</button>
            <div id="rewardResult"></div>
        </div>`;
        document.getElementById('getRewardBtn').onclick = () => {
            let code = document.getElementById('rewardCode').value.trim();
            if(code === "COFFEE100") {
                let stats = getUserStats(currentUser);
                let bonus = 50;
                stats.balance += bonus;
                stats.totalIncome += bonus;
                saveUserStats(currentUser, stats);
                document.getElementById('rewardResult').innerHTML = `<div class="success">You got ETB ${bonus}!</div>`;
                updateDashboardUI();
            } else {
                document.getElementById('rewardResult').innerHTML = `<div class="error">Invalid code</div>`;
            }
        };
    }

    // Navigation
    function showPanel(panelName) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
        document.getElementById(panelName+'Panel').classList.add('active-panel');
        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.classList.remove('active');
            if(nav.getAttribute('data-nav') === panelName) nav.classList.add('active');
        });
        if(panelName === 'home') renderHome();
        if(panelName === 'orders') renderOrders();
        if(panelName === 'show') renderShare();
        if(panelName === 'share') renderShare();
        if(panelName === 'my') renderMy();
        if(panelName === 'deposit') renderDeposit();
        if(panelName === 'withdraw') renderWithdraw();
        if(panelName === 'service') renderService();
    }

    // Quick actions
    document.querySelectorAll('.quick-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            let action = btn.getAttribute('data-action');
            if(action === 'deposit') showPanel('deposit');
            else if(action === 'withdraw') showPanel('withdraw');
            else if(action === 'checkin') renderCheckIn();
            else if(action === 'service') showPanel('service');
        });
    });

    // Auth
    function showAuth() { document.getElementById('authSection').style.display = 'block'; document.getElementById('dashboard').style.display = 'none'; }
    function showDashboard() { document.getElementById('authSection').style.display = 'none'; document.getElementById('dashboard').style.display = 'block'; updateDashboardUI(); processDailyIncome(currentUser); showPanel('home'); }
    const loginTab = document.getElementById('loginTab'), registerTab = document.getElementById('registerTab');
    const loginFormDiv = document.getElementById('loginForm'), registerFormDiv = document.getElementById('registerForm');
    loginTab.onclick = () => { loginTab.classList.add('active'); registerTab.classList.remove('active'); loginFormDiv.style.display='block'; registerFormDiv.style.display='none'; };
    registerTab.onclick = () => { registerTab.classList.add('active'); loginTab.classList.remove('active'); loginFormDiv.style.display='none'; registerFormDiv.style.display='block'; };
    document.getElementById('doLoginBtn').onclick = () => {
        let phone = document.getElementById('loginPhone').value.trim();
        let pwd = document.getElementById('loginPassword').value;
        let users = getUsers();
        if(!users[phone] || users[phone].password !== pwd) { document.getElementById('loginError').innerText = "Invalid credentials"; return; }
        currentUser = phone;
        localStorage.setItem("tc_logged", phone);
        showDashboard();
    };
    document.getElementById('doRegisterBtn').onclick = () => {
        let phone = document.getElementById('regPhone').value.trim();
        let pwd = document.getElementById('regPassword').value;
        let confirm = document.getElementById('regConfirm').value;
        let invCode = document.getElementById('inviteCode').value.trim();
        let users = getUsers();
        if(!phone || !pwd || !confirm) { document.getElementById('regError').innerText = "Fill all fields"; return; }
        if(pwd !== confirm) { document.getElementById('regError').innerText = "Passwords don't match"; return; }
        if(users[phone]) { document.getElementById('regError').innerText = "User exists"; return; }
        let inviteCode = Math.random().toString(36).substring(2,8).toUpperCase();
        users[phone] = { password:pwd, inviteCode, referrer:null };
        if(invCode) {
            for(let p in users) {
                if(users[p].inviteCode === invCode) {
                    users[phone].referrer = p;
                    let referrals = getReferralTree();
                    if(!referrals[p]) referrals[p] = { members: [], activeMembers: [] };
                    if(!referrals[p].members.includes(phone)) referrals[p].members.push(phone);
                    saveReferralTree(referrals);
                    break;
                }
            }
        }
        saveUsers(users);
        saveUserStats(phone, { balance:0, totalIncome:0, totalDeposit:0, totalWithdraw:0, lastCheckIn:null });
        saveUserPurchases(phone, []);
        saveUserWithdrawals(phone, []);
        saveUserTransactions(phone, []);
        currentUser = phone;
        localStorage.setItem("tc_logged", phone);
        showDashboard();
    };
    document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem("tc_logged"); currentUser = null; showAuth(); };
    document.querySelectorAll('.nav-item').forEach(nav => nav.addEventListener('click', () => showPanel(nav.getAttribute('data-nav'))));

    let saved = localStorage.getItem("tc_logged");
    let users = getUsers();
    if(saved && users[saved]) { currentUser = saved; showDashboard(); } else showAuth();
</script>
</body>
</html>
